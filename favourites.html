<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DonkeyApp — Favourites</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>
body {
margin:0;
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(180deg,#f7f9fd 0%,#eef3fb 100%);
color:#111;
}

.topBar {
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #e2e2e2;
padding:12px 16px;
display:flex;
align-items:center;
gap:12px;
z-index:10;
}

.searchWrap {
flex:1;
display:flex;
align-items:center;
border:1px solid #e2e2e2;
border-radius:12px;
padding:8px 10px;
background:#fff;
}

.searchWrap input {
flex:1;
border:0;
outline:none;
}

.page {
max-width:760px;
margin:0 auto;
padding:16px;
}

.card {
background:#fff;
border:1px solid #e2e2e2;
border-radius:16px;
padding:14px;
margin-bottom:12px;
}

.jokeText {
font-size:16px;
line-height:1.5;
white-space:pre-wrap;
}

.addedBy {
margin-top:8px;
font-size:13px;
color:#666;
}

.cardFooter {
margin-top:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid #eee;
padding-top:8px;
}

button {
border:1px solid #e5e5e5;
background:#f8f8f8;
border-radius:10px;
cursor:pointer;
padding:6px 8px;
}

button.active {
color:#d32f2f;
}

.smallNote {
text-align:center;
color:#666;
padding:20px 0;
}
</style>

</head>

<body>

<div class="topBar">
<strong>❤️ Favourites</strong>
<div class="searchWrap">
<input id="searchInput" placeholder="Search favourites..." />
</div>
</div>

<div class="page">
<div id="jokesList"></div>
<div id="emptyState" class="smallNote" style="display:none;">
No favourites yet.
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", async () => {

const FAV_KEY = "donkey:favourites:v1";
const VOTE_KEY = "donkey:votes:v1";
const MOBILE_PROMO_EVERY = 10;

const list = document.getElementById("jokesList");
const empty = document.getElementById("emptyState");
const searchInput = document.getElementById("searchInput");

function getFav() {
try { return JSON.parse(localStorage.getItem(FAV_KEY) || "[]"); }
catch { return []; }
}

function getVotes() {
try { return JSON.parse(localStorage.getItem(VOTE_KEY) || "{}"); }
catch { return {}; }
}

let favIds = getFav();
let votes = getVotes();
let allJokes = [];

if (!favIds.length) {
empty.style.display = "block";
return;
}

const { createClient } = window.supabase;

// ✅ SAME KEY AS YOUR MAIN SITE
const client = createClient(
"https://mknsvxajrvdlwqywvlrf.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1rbnN2eGFqcnZkbHdxeXd2bHJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NzE5ODIsImV4cCI6MjA4MTA0Nzk4Mn0.2urjAD5bb20Y73ZuWffeyfjDjoj7ISsowMRq9iYm-xo"
);

const { data } = await client
.from("jokes")
.select("id, content, user_id")
.in("id", favIds);

allJokes = data || [];

function saveFav() {
localStorage.setItem(FAV_KEY, JSON.stringify(favIds));
}

function saveVotes() {
localStorage.setItem(VOTE_KEY, JSON.stringify(votes));
}

function createPromoCard() {
const promo = document.createElement("div");
promo.className = "card";
promo.innerHTML = '<img src="/appad.jpg" style="width:100%; border-radius:12px;">';
return promo;
}

function render(items) {

list.innerHTML = "";

if (!items.length) {
empty.style.display = "block";
return;
}

empty.style.display = "none";

items.forEach((j, index) => {

const card = document.createElement("div");
card.className = "card";

const text = document.createElement("div");
text.className = "jokeText";
text.textContent = j.content;
card.appendChild(text);

const added = document.createElement("div");
added.className = "addedBy";
added.textContent = "Added by Anonymous";
card.appendChild(added);

const footer = document.createElement("div");
footer.className = "cardFooter";

const left = document.createElement("div");

// voting
if (votes[j.id]) {
left.textContent = "Your vote: " + votes[j.id];
} else {
["😕","😐","🙂","😂"].forEach((emoji, i)=>{
const types = ["bad","meh","good","great"];
const b = document.createElement("button");
b.textContent = emoji;
b.onclick = ()=>{
if (votes[j.id]) return;
votes[j.id]=types[i];
saveVotes();
render(allJokes);
};
left.appendChild(b);
});
}

const right = document.createElement("div");

// copy
const copy = document.createElement("button");
copy.textContent = "📋";
copy.onclick = ()=>{
navigator.clipboard.writeText(j.content);
};

// remove favourite
const fav = document.createElement("button");
fav.textContent = "♥";
fav.className = "active";
fav.onclick = ()=>{
favIds = favIds.filter(id=>id!==j.id);
saveFav();
allJokes = allJokes.filter(x=>x.id!==j.id);
render(allJokes);
};

right.appendChild(copy);
right.appendChild(fav);

footer.appendChild(left);
footer.appendChild(right);

card.appendChild(footer);

list.appendChild(card);

// ✅ mobile promo every 10
if ((index + 1) % MOBILE_PROMO_EVERY === 0) {
list.appendChild(createPromoCard());
}

});

}

render(allJokes);

// search inside favourites only
searchInput.addEventListener("input", ()=>{
const q = searchInput.value.toLowerCase();
const filtered = allJokes.filter(j =>
(j.content || "").toLowerCase().includes(q)
);
render(filtered);
});

});
</script>


</body>
</html>
