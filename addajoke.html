<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Add a Joke</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      background-color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px 15px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: left;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 26px;
    }

    p.intro {
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 14px;
      margin-top: 16px;
      margin-bottom: 4px;
    }

    textarea, input[type="email"], select {
      width: 100%;
      box-sizing: border-box;
      font-family: inherit;
      font-size: 14px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    button {
      margin-top: 18px;
      padding: 10px 22px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #f7f7f7;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
      white-space: pre-wrap;
    }

    .links {
      margin-top: 30px;
      font-size: 13px;
      text-align: center;
    }

    .links a {
      color: #0000ee;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Add a Joke</h1>
    <p class="intro">
      Share your joke with the world. Please keep it friendly – no hate, abuse or personal data.
    </p>

    <form id="addJokeForm">
      <label for="jokeContent">Your joke</label>
      <textarea id="jokeContent" placeholder="Type your joke here..." required></textarea>

      <label for="jokeLanguage">Language</label>
      <select id="jokeLanguage" aria-label="Select joke language">
        <option value="English" selected>English</option>
        <option value="Polish">Polish</option>
        <option value="German">German</option>
        <option value="French">French</option>
        <option value="Spanish">Spanish</option>
        <option value="Other">Other</option>
      </select>

      <label for="jokeEmail">Your email (optional)</label>
      <input
        id="jokeEmail"
        type="email"
        placeholder="We might contact you if we ever curate the best jokes. Leave empty if you prefer."
        autocomplete="email"
      />

      <button id="submitBtn" type="submit">Submit joke</button>
    </form>

    <div id="message"></div>

    <div class="links">
      <div><a href="index.html">Back to jokes</a></div>
      <div style="margin-top:6px;"><a href="privacy.html">Privacy Policy</a></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    // Supabase config (anon key – safe for frontend)
    const supabaseUrl = 'https://mknsvxajrvdlwqywvlrf.supabase.co';
    const supabaseKey = 'sb_publishable_i1L1dBbWF-c5ntUINgnUyQ_rWbxB_bw';

    const supabase = createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById('addJokeForm');
    const jokeContentInput = document.getElementById('jokeContent');
    const jokeEmailInput = document.getElementById('jokeEmail');
    const jokeLanguageSelect = document.getElementById('jokeLanguage');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    function setMessage(text, isError = false) {
      messageDiv.textContent = text;
      messageDiv.style.color = isError ? 'crimson' : 'green';
    }

// ------------------------------------------------------
// Anti-spam: device token (stored locally)
// Purpose: identify a submitter without login, so we can cap at 100.
// ------------------------------------------------------
const SUBMITTER_TOKEN_KEY = "donkey_submitter_token_v1";

function getOrCreateSubmitterToken() {
  let token = localStorage.getItem(SUBMITTER_TOKEN_KEY);

  if (token && token.length >= 16) return token;

  // Create a reasonably unique token (client-side)
  // Uses crypto when available, otherwise falls back to Math.random
  if (window.crypto && crypto.getRandomValues) {
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    token = Array.from(bytes)
      .map((b) => b.toString(16).padStart(2, "0"))
      .join("");
  } else {
    token = (
      Date.now().toString(16) +
      Math.random().toString(16).slice(2) +
      Math.random().toString(16).slice(2)
    ).slice(0, 32);
  }

  localStorage.setItem(SUBMITTER_TOKEN_KEY, token);
  return token;
}

// ------------------------------------------------------
// Helper: fetch how many jokes this token has submitted
// ------------------------------------------------------
async function getSubmissionCount(token) {
  const { data, error } = await supabase.rpc("get_submission_count", {
    p_submitter_token: token,
  });

  if (error) {
    console.log("Count RPC failed:", error);
    return null;
  }

  return typeof data === "number" ? data : null;
}
    
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('');

      const content = jokeContentInput.value.trim();
      const emailRaw = jokeEmailInput.value.trim();
      const language = jokeLanguageSelect.value;

      // COMMENT: device token used for the 100-joke cap
const submitterToken = getOrCreateSubmitterToken();

      if (!content) {
        setMessage('Please type a joke before submitting.', true);
        return;
      }

      // basic sanity on email (browser already validates type="email", but keep it safe)
      const email = emailRaw.length ? emailRaw : null;

      submitBtn.disabled = true;
      setMessage('Submitting...');

      // Use array form for insert (most robust)
const payload = [{
  content: content,
  language: language,            // column is "language"
  added_by_email: email,
  submitter_token: submitterToken, // REQUIRED for capped insert policy
  is_new: true,
  is_visible: false,             // safer default (moderation-friendly)
  is_flagged: false
}];

      const { data, error } = await supabase
        .from('jokes')
        .insert(payload)

      submitBtn.disabled = false;

      if (error) {
        console.error('Supabase insert error:', error);
        // Show the real reason (this is what you need for debugging)
        setMessage(
          `Error saving joke:\n${error.message}\n${error.details ?? ''}`.trim(),
          true
        );
        return;
      }

// COMMENT: After submit, show progress and warn if approaching limit
const count = await getSubmissionCount(submitterToken);

// Base success message
let msg = `Thank you! Your joke has been submitted.`;

// Add progress if we could fetch it
if (typeof count === "number") {
  msg += `\n\nSubmissions from this device: ${count} / 100`;

  // Soft warnings for real contributors
  if (count >= 95) {
    msg += `\n\nYou are very close to the limit. If you’re a genuine contributor, email us and we’ll lift it.`;
  } else if (count >= 80) {
    msg += `\n\nYou’re approaching the limit. If you plan to submit lots more, consider emailing us so we can whitelist you.`;
  }
}

setMessage(msg);

      jokeContentInput.value = '';
      jokeEmailInput.value = '';
      jokeLanguageSelect.value = 'English';
    });
  </script>
</body>
</html>
